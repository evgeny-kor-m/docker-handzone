services:
  application:
    image: lab5-app-image
    container_name: lab5-app
    restart: always
    ports:
      - ${APP_PORT}:3000
    depends_on:
      mysql-server:
        condition: service_healthy
  mysql-server:
    image: mysql:latest
    container_name: lab5-mysql-server
    restart: always
    ports:
      - ${DB_PORT}:3306
    volumes:
      - mysql-volume:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSW}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSW}"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Validate MySql is running exec to container and run mysql -u root -p
  mysql-client:
    restart: always
    image: phpmyadmin/phpmyadmin:latest
    container_name: lab5-mysql-client
    ports:
      - 8081:80
    environment:
      PMA_HOST: mysql-server
      MYSQL_ROOT_PASSWORD: ${DB_PASSW}
    depends_on:
      mysql-server:
        condition: service_healthy


networks:
  default:
    external: true
    name: ansible-net

volumes:
  mysql-volume:
    external: true
